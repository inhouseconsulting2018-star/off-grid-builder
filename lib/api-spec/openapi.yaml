openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: OffGrid Solar Builder API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Solar project operations
  - name: settings
    description: Admin settings operations
  - name: calculations
    description: Solar calculation operations
  - name: payments
    description: Stripe payment operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all solar projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new solar project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update an existing project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectPatch"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /projects/{id}/regeocode:
    post:
      operationId: regeocodeProject
      tags: [projects]
      summary: Geocode (or re-geocode) a project address and save lat/lon/accuracy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated project with geocode result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Missing city/state or invalid ID
        "404":
          description: Project not found
        "422":
          description: Geocoding failed — address could not be located

  /projects/{id}/calculate:
    post:
      operationId: calculateProject
      tags: [calculations]
      summary: Run solar calculations for a project and persist results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calculation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculationResult"
        "404":
          description: Project not found

  /projects/{id}/create-checkout-session:
    post:
      operationId: createProjectCheckoutSession
      tags: [payments]
      summary: Create a Stripe Checkout session to unlock the full solar report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [selectedPlan]
              properties:
                selectedPlan:
                  type: string
                  enum: [homeowner_report, property_pack, contractor_annual, contractor_lifetime_beta]
                productType:
                  type: string
                  enum: [homeowner, property_pack, contractor_annual, contractor_lifetime]
      responses:
        "200":
          description: Checkout session URL to redirect the user to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResult"
        "400":
          description: Invalid project ID or project already paid
        "404":
          description: Project not found
        "500":
          description: Stripe not configured (STRIPE_PRICE_ID missing)

  /proposals/estimate:
    post:
      operationId: createProposalEstimate
      tags: [calculations]
      summary: Quick stateless solar proposal estimate (no DB write)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalEstimateInput"
      responses:
        "200":
          description: Solar proposal estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalEstimate"
        "400":
          description: Invalid input

  /projects/stats/summary:
    get:
      operationId: getProjectsSummary
      tags: [projects]
      summary: Dashboard summary stats across all projects
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsSummary"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current admin calculation settings
      responses:
        "200":
          description: Settings object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update admin calculation settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsPatch"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - systemType
        - installationType
        - annualKwh
        - state
        - city
        - address
        - zip
        - shadeLevel
        - roofPitch
        - roofDirection
        - availableSqft
        - snowArea
        - highWindArea
        - backupHours
        - budgetTier
        - utilityRatePerKwh
        - monthlyBill
        - customBudget
        - customBackupHours
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        installationType:
          type: string
          enum: [roof, ground, pole, carport]
        systemType:
          type: string
          enum: [off-grid, grid-tied, hybrid]
        annualKwh:
          type: number
        monthlyBill:
          type: number
        utilityRatePerKwh:
          type: number
        backupHours:
          type: number
        customBackupHours:
          type: ["number", "null"]
        batteryChemistry:
          type: string
          enum: [lifepo4, agm, lead-acid, none]
        hasGenerator:
          type: boolean
        generatorKw:
          type: ["number", "null"]
        wantsGenerator:
          type: boolean
        shadeLevel:
          type: string
          enum: [none, light, medium, heavy]
        roofPitch:
          type: string
        roofDirection:
          type: string
        availableSqft:
          type: number
        snowArea:
          type: boolean
        highWindArea:
          type: boolean
        budgetTier:
          type: string
          enum: [economy, mid-range, premium, custom]
        customBudget:
          type: ["number", "null"]
        arrayLat:
          type: ["number", "null"]
          description: "Latitude of the solar array (if different from property address)"
        arrayLon:
          type: ["number", "null"]
          description: "Longitude of the solar array (if different from property address)"
        arrayLocationNote:
          type: ["string", "null"]
          description: "Free-text description of where the array will be installed"
        lat:
          type: ["number", "null"]
          description: "Geocoded latitude of the property address. Null until geocoding runs."
        lon:
          type: ["number", "null"]
          description: "Geocoded longitude of the property address. Null until geocoding runs."
        locationAccuracy:
          type: ["string", "null"]
          description: "'exact' = street-level geocode, 'zip' = ZIP centroid, 'city' = city centroid, 'manual' = user-entered coordinates"
        useManualCoords:
          type: boolean
          description: "When true the map uses lat/lon directly without re-geocoding."
        calculationResult:
          $ref: "#/components/schemas/CalculationResult"
        paidAt:
          type: ["string", "null"]
          format: date-time
          description: "Timestamp when the project was unlocked via Stripe payment. Null = unpaid."
        stripeSessionId:
          type: ["string", "null"]
          description: "Stripe Checkout Session ID associated with the successful payment."
        stripePriceId:
          type: ["string", "null"]
          description: "Stripe Price ID used in the checkout session."
        paidAmount:
          type: ["integer", "null"]
          description: "Amount paid in cents (USD)."
        paymentStatus:
          type: string
          description: "Payment status: unpaid | paid | refunded"
        entitlementType:
          type: ["string", "null"]
          description: "Plan purchased: homeowner | property_pack | contractor_annual | contractor_lifetime"
        reportCredits:
          type: integer
          description: "Number of full report credits granted by this purchase."
        creditsUsed:
          type: integer
          description: "Number of report credits consumed so far."
        selectedPlan:
          type: ["string", "null"]
          description: "Slug of the plan selected at checkout."
        accessToken:
          type: ["string", "null"]
          description: "Per-project access token returned on creation. Required in x-access-token header for subsequent requests."
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required:
        - name
        - systemType
        - installationType
        - annualKwh
        - state
        - city
        - address
        - zip
        - shadeLevel
        - roofPitch
        - roofDirection
        - availableSqft
        - snowArea
        - highWindArea
        - backupHours
        - budgetTier
        - utilityRatePerKwh
        - monthlyBill
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        installationType:
          type: string
          enum: [roof, ground, pole, carport]
        systemType:
          type: string
          enum: [off-grid, grid-tied, hybrid]
        annualKwh:
          type: number
          minimum: 0
        monthlyBill:
          type: number
          minimum: 0
        utilityRatePerKwh:
          type: number
          minimum: 0
        backupHours:
          type: number
          minimum: 0
        customBackupHours:
          type: ["number", "null"]
        batteryChemistry:
          type: string
          enum: [lifepo4, agm, lead-acid, none]
        hasGenerator:
          type: boolean
        generatorKw:
          type: ["number", "null"]
        wantsGenerator:
          type: boolean
        shadeLevel:
          type: string
          enum: [none, light, medium, heavy]
        roofPitch:
          type: string
        roofDirection:
          type: string
        availableSqft:
          type: number
          minimum: 0
        snowArea:
          type: boolean
        highWindArea:
          type: boolean
        budgetTier:
          type: string
          enum: [economy, mid-range, premium, custom]
        customBudget:
          type: ["number", "null"]
        arrayLat:
          type: ["number", "null"]
        arrayLon:
          type: ["number", "null"]
        arrayLocationNote:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
          description: "Geocoded latitude of the property address."
        lon:
          type: ["number", "null"]
          description: "Geocoded longitude of the property address."
        locationAccuracy:
          type: ["string", "null"]
          description: "'exact' | 'zip' | 'city' | 'manual'"
        useManualCoords:
          type: boolean
          description: "When true the map uses lat/lon directly without re-geocoding."

    ProjectPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        installationType:
          type: string
          enum: [roof, ground, pole, carport]
        systemType:
          type: string
          enum: [off-grid, grid-tied, hybrid]
        annualKwh:
          type: number
          minimum: 0
        monthlyBill:
          type: number
          minimum: 0
        utilityRatePerKwh:
          type: number
          minimum: 0
        backupHours:
          type: number
          minimum: 0
        customBackupHours:
          type: ["number", "null"]
        batteryChemistry:
          type: string
          enum: [lifepo4, agm, lead-acid, none]
        hasGenerator:
          type: boolean
        generatorKw:
          type: ["number", "null"]
        wantsGenerator:
          type: boolean
        shadeLevel:
          type: string
          enum: [none, light, medium, heavy]
        roofPitch:
          type: string
        roofDirection:
          type: string
        availableSqft:
          type: number
          minimum: 0
        snowArea:
          type: boolean
        highWindArea:
          type: boolean
        budgetTier:
          type: string
          enum: [economy, mid-range, premium, custom]
        customBudget:
          type: ["number", "null"]
        arrayLat:
          type: ["number", "null"]
        arrayLon:
          type: ["number", "null"]
        arrayLocationNote:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
          description: "Geocoded latitude of the property address."
        lon:
          type: ["number", "null"]
          description: "Geocoded longitude of the property address."
        locationAccuracy:
          type: ["string", "null"]
          description: "'exact' | 'zip' | 'city' | 'manual'"
        useManualCoords:
          type: boolean
          description: "When true the map uses lat/lon directly without re-geocoding."

    CalculationResult:
      type: object
      required:
        - dailyKwh
        - peakSunHours
        - arraySizeKw
        - numPanels
        - adjustedArraySizeKw
        - inverterSizeKw
        - batteryUsableKwh
        - totalBatteryBankKwh
        - yearlyProductionKwh
        - totalSystemLossPct
        - inverterLossPct
        - wireLossPct
        - shadeLossPct
        - tempLossPct
        - dirtLossPct
        - batteryLossPct
        - diyEquipmentCostLow
        - diyEquipmentCostHigh
        - installedCostLow
        - installedCostHigh
        - estimatedYearlySavings
        - paybackYears
        - recommendedPanelBrand
        - recommendedInverterBrand
        - recommendedBatteryBrand
        - recommendedMountingBrand
        - notes
      properties:
        dailyKwh:
          type: number
        peakSunHours:
          type: number
        arraySizeKw:
          type: number
        numPanels:
          type: integer
        adjustedArraySizeKw:
          type: number
        inverterSizeKw:
          type: number
        batteryUsableKwh:
          type: number
        totalBatteryBankKwh:
          type: number
        yearlyProductionKwh:
          type: number
        totalSystemLossPct:
          type: number
        inverterLossPct:
          type: number
        wireLossPct:
          type: number
        shadeLossPct:
          type: number
        tempLossPct:
          type: number
        dirtLossPct:
          type: number
        batteryLossPct:
          type: number
        diyEquipmentCostLow:
          type: number
        diyEquipmentCostHigh:
          type: number
        installedCostLow:
          type: number
        installedCostHigh:
          type: number
        solarArrayDiyCostLow:
          type: number
          description: "Solar array only (panels + inverter + racking), DIY equipment cost — low bound"
        solarArrayDiyCostHigh:
          type: number
          description: "Solar array only (panels + inverter + racking), DIY equipment cost — high bound"
        solarArrayInstalledCostLow:
          type: number
          description: "Solar array only, fully installed cost — low bound"
        solarArrayInstalledCostHigh:
          type: number
          description: "Solar array only, fully installed cost — high bound"
        batteryDiyCostLow:
          type: number
          description: "Battery bank equipment cost only (excludes installation labor) — low bound"
        batteryDiyCostHigh:
          type: number
          description: "Battery bank equipment cost only — high bound"
        batteryInstalledCostLow:
          type: number
          description: "Battery bank equipment + installation labor — low bound"
        batteryInstalledCostHigh:
          type: number
          description: "Battery bank equipment + installation labor — high bound"
        usedSolarEquipCostLow:
          type: number
          description: "Used/refurbished panels + inverter — low estimate (~40% of new)"
        usedSolarEquipCostHigh:
          type: number
          description: "Used/refurbished panels + inverter — high estimate (~55% of new)"
        usedBatteryEquipCostLow:
          type: ["number", "null"]
          description: "Used battery equipment cost — null if lithium (not recommended used)"
        usedBatteryEquipCostHigh:
          type: ["number", "null"]
          description: "Used battery equipment cost high bound — null if lithium"
        batteryAutonomyDays:
          type: number
          description: "Battery autonomy in days (backupHours / 24). 0 if no battery."
        batteryInverterEfficiencyPct:
          type: number
          description: "Inverter efficiency % used when sizing battery load (e.g. 95)"
        batterySurgeReservePct:
          type: number
          description: "Motor-start surge headroom added to usable kWh (% of autonomy load)"
        batteryWeatherReservePct:
          type: number
          description: "Cloudy-day autonomy buffer added on top of surge-adjusted load (%)"
        batteryEffectiveDodPct:
          type: number
          description: "Effective depth of discharge used in sizing (80 for LiFePO4, 50 for lead)"
        batteryColdDeratingPct:
          type: number
          description: "Cold-climate bank upsize % applied for lead chemistry in snow areas (0 if N/A)"
        batteryRawDailyLoadKwh:
          type: number
          description: "AC daily load before inverter-efficiency adjustment (kWh/day)"
        batteryInverterAdjustedLoadKwh:
          type: number
          description: "Daily load the battery must supply after inverter-efficiency adjustment (kWh/day)"
        inverterCostEstimate:
          type: number
          description: "Rough inverter equipment cost estimate: inverterSizeKw × inverterCostPerKw from settings"
        mountingCostEstimate:
          type: number
          description: "Rough mounting/racking cost estimate: numPanels × mountingCostPerPanel from settings"
        estimatedYearlySavings:
          type: number
        paybackYears:
          type: ["number", "null"]
        recommendedPanelBrand:
          type: string
        recommendedInverterBrand:
          type: string
        recommendedBatteryBrand:
          type: string
        recommendedMountingBrand:
          type: string
        notes:
          type: array
          items:
            type: string
        pvwattsMonthlyKwh:
          type: array
          items:
            type: number
          nullable: true
          description: "12-element array of monthly AC production (kWh) from PVWatts. Null if PVWatts unavailable."
        pvwattsSolradMonthly:
          type: array
          items:
            type: number
          nullable: true
          description: "12-element array of monthly average daily solar irradiance (kWh/m²/day) from PVWatts."
        pvwattsAnnualKwh:
          type: ["number", "null"]
          description: "Annual AC energy production (kWh) from PVWatts. Null if PVWatts unavailable."
        pvwattsSolradAnnual:
          type: ["number", "null"]
          description: "Annual average daily solar irradiance (kWh/m²/day) = real peak sun hours from PVWatts."
        pvwattsCapacityFactor:
          type: ["number", "null"]
          description: "System capacity factor (%) from PVWatts."
        pvwattsSource:
          type: ["string", "null"]
          description: "Either 'pvwatts' (real data) or 'fallback' (state estimate). Null for legacy records."
        misMatchLossPct:
          type: number
          description: "Panel-to-panel mismatch and manufacturing tolerance loss (%). Typically 2%."
        squareFeetRequired:
          type: number
          description: "Total panel footprint required including racking clearance (sqft)."
        offGridDesignFactor:
          type: number
          description: "Array design safety factor applied: 1.15 for off-grid, 1.08 for hybrid, 1.0 for grid-tied."
        batteryTempDeratingPct:
          type: number
          description: "Extra battery bank capacity added for cold-climate temperature derating (0 if not applied)."

    CheckoutSessionResult:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: "Stripe-hosted Checkout URL to redirect the user to for payment."

    ProposalEstimateInput:
      type: object
      required:
        - address
        - city
        - state
        - zip
      properties:
        address:
          type: string
        city:
          type: string
        state:
          type: string
          minLength: 2
          maxLength: 2
        zip:
          type: string
        annualKwh:
          type: number
          nullable: true
        monthlyKwh:
          type: number
          nullable: true
        panelWattage:
          type: number
          default: 440
        efficiencyFactor:
          type: number
          default: 0.78
        includeBattery:
          type: boolean
          default: false
        batteryBackupHours:
          type: number
          default: 8

    ProposalEstimate:
      type: object
      required:
        - address
        - city
        - state
        - zip
        - annualKwhUsage
        - monthlyKwhUsage
        - peakSunHours
        - peakSunHoursSource
        - panelWattage
        - efficiencyFactor
        - requiredSystemKw
        - panelCount
        - finalSystemKw
        - estimatedAnnualKwh
        - estimatedMonthlyKwh
        - offsetPct
        - notes
      properties:
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        annualKwhUsage:
          type: number
        monthlyKwhUsage:
          type: number
        peakSunHours:
          type: number
        peakSunHoursSource:
          type: string
          description: "'pvwatts' | 'state' | 'default'"
        panelWattage:
          type: number
        efficiencyFactor:
          type: number
        requiredSystemKw:
          type: number
        panelCount:
          type: integer
        finalSystemKw:
          type: number
        estimatedAnnualKwh:
          type: number
        estimatedMonthlyKwh:
          type: number
        offsetPct:
          type: number
        monthlyProductionKwh:
          type: array
          items:
            type: number
          nullable: true
        batteryRecommendedKwh:
          type: number
          nullable: true
        notes:
          type: array
          items:
            type: string

    ProjectsSummary:
      type: object
      required:
        - totalProjects
        - totalSystemKw
        - avgSystemKw
        - offGridCount
        - gridTiedCount
        - hybridCount
        - recentProjects
      properties:
        totalProjects:
          type: integer
        totalSystemKw:
          type: number
        avgSystemKw:
          type: number
        offGridCount:
          type: integer
        gridTiedCount:
          type: integer
        hybridCount:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    Settings:
      type: object
      required:
        - id
        - panelWattage
        - baseSystemLossPct
        - inverterLossPct
        - wireLossPct
        - dirtLossPct
        - tempLossPct
        - batteryRoundTripLossPct
        - batteryDod
        - defaultUtilityRate
        - economyDiyPerWatt
        - economyInstalledPerWatt
        - midRangeDiyPerWatt
        - midRangeInstalledPerWatt
        - premiumDiyPerWatt
        - premiumInstalledPerWatt
        - inverterCostPerKw
        - mountingCostPerPanel
      properties:
        id:
          type: integer
        panelWattage:
          type: number
        baseSystemLossPct:
          type: number
        inverterLossPct:
          type: number
        wireLossPct:
          type: number
        dirtLossPct:
          type: number
        tempLossPct:
          type: number
        batteryRoundTripLossPct:
          type: number
        batteryDod:
          type: number
        defaultUtilityRate:
          type: number
        economyDiyPerWatt:
          type: number
        economyInstalledPerWatt:
          type: number
        midRangeDiyPerWatt:
          type: number
        midRangeInstalledPerWatt:
          type: number
        premiumDiyPerWatt:
          type: number
